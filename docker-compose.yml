version: '3.9'

services:
  api:
    build: .
    container_name: albero-api
    restart: unless-stopped
    ports:
      - '3000:3000'
      - '9229:9229'
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/albero
    command: node --inspect=0.0.0.0:9229 dist/main
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: albero-mongo
    restart: unless-stopped
    ports:
      - '27018:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
